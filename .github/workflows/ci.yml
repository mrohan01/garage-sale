name: Box Drop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: garagesale_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build and test
        run: ./gradlew build
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_NAME: garagesale_test
          DB_USERNAME: test
          DB_PASSWORD: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-web/package-lock.json
      - run: npm ci
        working-directory: mobile-web
      - run: npm test -- --ci
        working-directory: mobile-web

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Start Docker services (postgres, redis, minio)
      - name: Start Docker services
        run: docker compose up -d

      # Set up Java for backend
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        run: ./gradlew build -x test
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_NAME: boxdrop
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      # Start backend in background
      - name: Start backend
        run: ./gradlew run &
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_NAME: boxdrop
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      # Install frontend dependencies
      - run: npm ci
        working-directory: mobile-web

      # Build and start Expo web in background
      - run: npx expo export
        working-directory: mobile-web
      - run: npx serve dist -l 8081 &
        working-directory: mobile-web

      # Wait for services to be ready
      - name: Wait for services
        run: |
          sleep 30
          curl -f http://localhost:8080/health || exit 1

      # Install and run E2E tests
      - run: npm ci
        working-directory: tests/e2e
      - run: npx playwright install --with-deps
        working-directory: tests/e2e
      - name: Clean up stale test data
        run: |
          docker exec -i boxdrop-db-1 psql -U postgres -d boxdrop -c "DELETE FROM transactions; DELETE FROM saved_items WHERE listing_id IN (SELECT id FROM listings WHERE sale_id IN (SELECT id FROM sales WHERE title LIKE '%Test Sale%')); DELETE FROM listings WHERE sale_id IN (SELECT id FROM sales WHERE title LIKE '%Test Sale%'); DELETE FROM sales WHERE title LIKE '%Test Sale%';"
      - run: npx playwright test --workers=1
        working-directory: tests/e2e
