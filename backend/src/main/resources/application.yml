jackson:
  serialization:
    writeDatesAsTimestamps: false

micronaut:
  application:
    name: boxdrop-backend
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - http://localhost
            - http://localhost:19006
            - http://localhost:8081
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Authorization

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:boxdrop}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driverClassName: org.postgresql.Driver
    dialect: POSTGRES

flyway:
  datasources:
    default:
      enabled: true
      locations:
        - classpath:db/migration

redis:
  uri: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

boxdrop:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars!!}
    access-token-expiry: 900
    refresh-token-expiry: 604800
  s3:
    bucket: ${S3_BUCKET:boxdrop-images}
    region: ${S3_REGION:us-east-1}
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX:5000}
    window-seconds: ${RATE_LIMIT_WINDOW:60}
  verification:
    otp-expiry-seconds: ${OTP_EXPIRY:600}
  resend:
    api-key: ${RESEND_API_KEY:}
    from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    platform-fee-percent: 10
